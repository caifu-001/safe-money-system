<div class="modal-backdrop hidden" id="modal"></div>
<div class="modal-box hidden" id="modalBox">
  <div class="modal-header">
    <h3>记账</h3>
    <button class="close-btn" onclick="closeModal()">&times;</button>
  </div>
  <div class="modal-body">
    <div class="type-tabs">
      <button onclick="setType('income')" id="tabIncome">收入</button>
      <button onclick="setType('expense')" id="tabExpense" class="active">支出</button>
    </div>

    <input class="form-control" type="number" id="amountEl" placeholder="金额">

    <div style="margin:10px 0">
      <label>主分类</label>
      <div class="category-grid" id="mainCategoryGrid"></div>
    </div>

    <div style="margin:10px 0">
      <label>子分类（可选）</label>
      <div class="category-grid" id="subCategoryGrid"></div>
    </div>

    <input class="form-control" type="date" id="tdate">
    <input class="form-control" type="text" id="noteEl" placeholder="备注">

    <button class="btn save-btn" onclick="saveRecord()">保存</button>
  </div>
</div>

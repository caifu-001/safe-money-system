<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>记账系统</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,sans-serif}
    body{background:#f5f7fa;padding:20px}
    .container{max-width:1000px;margin:0 auto;background:#fff;padding:24px;border-radius:12px}
    .nav{display:flex;gap:8px;margin:20px 0;flex-wrap:wrap}
    .nav button{padding:8px 14px;border:none;border-radius:6px;background:#eef;cursor:pointer}
    .nav button.active{background:#37f;color:#fff}
    .section{display:none}
    .section.active{display:block}
    input,select{width:100%;padding:8px;margin:6px 0;border:1px solid #ddd;border-radius:6px}
    .btn{padding:8px 14px;border:none;background:#37f;color:#fff;border-radius:6px;cursor:pointer}
    .btn-sm{padding:4px 8px;font-size:14px}
    .modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center}
    .modal-content{background:#fff;padding:24px;border-radius:12px;width:90%;max-width:700px}
    .category-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;margin:10px 0}
    .category-box{padding:8px;border:1px solid #eee;border-radius:6px;min-height:100px}
    .category-item{padding:6px;background:#f5f5f5;margin:4px 0;border-radius:4px;cursor:pointer}
    .category-item.active{background:#37f;color:#fff}
    .list div{padding:8px 0;border-bottom:1px solid #eee}
  </style>
</head>
<body>

<div class="container">
  <div style="display:flex;justify-content:space-between;align-items:center">
    <h2>个人记账系统</h2>
    <button class="btn btn-sm" onclick="logout()">退出登录（清空数据）</button>
  </div>

  <div class="nav">
    <button class="active" onclick="switchPage('overview')">首页</button>
    <button onclick="switchPage('records')">记账记录</button>
    <button onclick="switchPage('search')">搜索</button>
    <button onclick="switchPage('budget')">预算</button>
    <button onclick="switchPage('charts')">图表</button>
    <button onclick="switchPage('category')">分类管理</button>
    <button onclick="switchPage('adminPage')">用户管理</button>
  </div>

  <!-- 首页 -->
  <div id="overview" class="section active">
    <p>总收入：<span id="totalIncome">0</span></p>
    <p>总支出：<span id="totalExpense">0</span></p>
    <p>结余：<span id="totalBalance">0</span></p>
    <button class="btn" onclick="openModal()">添加记账</button>
    <div class="list" id="recentList" style="margin-top:16px"></div>
  </div>

  <!-- 记账记录 -->
  <div id="records" class="section">
    <button class="btn" onclick="openModal()">添加记账</button>
    <div class="list" id="recordList" style="margin-top:16px"></div>
  </div>

  <!-- 搜索 -->
  <div id="search" class="section">
    <input id="searchKey" placeholder="搜索分类/备注" oninput="searchRecord()">
    <div class="list" id="searchResult"></div>
  </div>

  <!-- 预算 -->
  <div id="budget" class="section">
    <input id="budgetVal" placeholder="月度预算" type="number">
    <button class="btn" onclick="setBudget()">保存预算</button>
    <p>预算：<span id="budgetShow">0</span></p>
    <p>本月已用：<span id="usedBudget">0</span></p>
    <p>剩余：<span id="leftBudget">0</span></p>
  </div>

  <!-- 图表 -->
  <div id="charts" class="section">
    <canvas id="pieChartEl" style="height:220px;margin-bottom:20px"></canvas>
    <canvas id="barChartEl" style="height:220px"></canvas>
  </div>

  <!-- 分类管理 -->
  <div id="category" class="section">
    <select id="catType">
      <option value="expense">支出</option>
      <option value="income">收入</option>
    </select>
    <input id="catName" placeholder="分类名称">
    <button class="btn" onclick="addCategory()">添加一级分类</button>
    <div id="catList" style="margin-top:16px"></div>
  </div>

  <!-- 用户管理 -->
  <div id="adminPage" class="section">
    <div id="allUsers"></div>
  </div>

  <!-- 记账弹窗 -->
  <div class="modal" id="modal">
    <div class="modal-content">
      <h4>添加记账</h4>
      <select id="typeSelect" onchange="setType(this.value)">
        <option value="expense">支出</option>
        <option value="income">收入</option>
      </select>

      <div class="category-grid">
        <div id="level1" class="category-box"></div>
        <div id="level2" class="category-box"></div>
        <div id="level3" class="category-box"></div>
        <div id="level4" class="category-box"></div>
        <div id="level5" class="category-box"></div>
      </div>

      <input id="amountEl" placeholder="金额" type="number">
      <input id="tdate" type="date">
      <input id="noteEl" placeholder="备注">
      <button class="btn" onclick="saveRecord()">保存</button>
      <button class="btn" style="background:#666;margin-left:8px" onclick="closeModal()">取消</button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="app.js"></script>
</body>
</html>
